<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>纯绘制小恐龙跑酷</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, sans-serif;
        }
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            background: #f8f8f8;
            padding-top: 24px;
        }
        canvas {
            border: 2px solid #222;
            background: #ffffff;
        }
        .score {
            font-size: 30px;
            font-weight: bold;
            margin-bottom: 12px;
        }
        .tip {
            margin-top: 12px;
            color: #555;
        }
        a {
            margin-top: 10px;
            color: #0066cc;
        }
    </style>
</head>
<body>
    <div class="score">分数：0</div>
    <canvas id="gameCanvas" width="800" height="200"></canvas>
    <div class="tip">空格/上箭头跳跃 | 下箭头下蹲 | 游戏结束按空格重开</div>
    <a href="./">返回首页</a>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreDom = document.querySelector('.score');

        // 游戏基础数据
        let score = 0;
        let speed = 6;
        let gameOver = false;
        const groundY = 180;

        // 恐龙参数
        const dino = {
            x: 40,
            y: groundY - 42,
            width: 40,
            height: 42,
            vy: 0,
            gravity: 0.6,
            jumpPower: -14,
            duck: false
        };

        let cactusList = [];
        let cloudList = [];

        // 键盘监听
        document.addEventListener('keydown', e => {
            if (gameOver) restart();
            if ((e.code === 'Space' || e.code === 'ArrowUp') && dino.y >= groundY - dino.height) {
                dino.vy = dino.jumpPower;
            }
            if (e.code === 'ArrowDown') dino.duck = true;
        })
        document.addEventListener('keyup', e => {
            if (e.code === 'ArrowDown') dino.duck = false;
        })

        // 重置游戏
        function restart() {
            score = 0;
            speed = 6;
            gameOver = false;
            dino.y = groundY - dino.height;
            dino.vy = 0;
            cactusList = [];
            cloudList = [];
            scoreDom.innerText = `分数：${score}`;
        }

        // 绘制恐龙（纯代码图形，无外部图片）
        function drawDino() {
            ctx.fillStyle = '#333333';
            let h = dino.duck ? 22 : dino.height;
            let yPos = dino.duck ? groundY - h : dino.y;
            // 身体主体
            ctx.fillRect(dino.x + 8, yPos + 8, dino.width - 12, h - 10);
            // 恐龙头部
            ctx.beginPath();
            ctx.arc(dino.x + 32, yPos + 10, 10, 0, Math.PI * 2);
            ctx.fill();
            // 恐龙腿
            if (!dino.duck) {
                ctx.fillRect(dino.x + 10, yPos + h - 6, 6, 8);
                ctx.fillRect(dino.x + 24, yPos + h - 6, 6, 8);
            }
            // 尾巴
            ctx.fillRect(dino.x, yPos + 14, 10, 6);
        }

        // 绘制仙人掌
        function drawCactus(item) {
            ctx.fillStyle = '#2d7030';
            ctx.fillRect(item.x + item.w * 0.3, item.y, item.w * 0.4, item.h);
            ctx.fillRect(item.x, item.y + item.h * 0.2, item.w * 0.35, item.h * 0.4);
            ctx.fillRect(item.x + item.w * 0.65, item.y + item.h * 0.35, item.w * 0.35, item.h * 0.45);
        }

        // 生成仙人掌
        function addCactus() {
            const w = 18 + Math.random() * 22;
            cactusList.push({
                x: canvas.width,
                y: groundY - w - 12,
                w: w,
                h: w + 12
            })
        }

        // 绘制云朵
        function drawCloud(item) {
            ctx.fillStyle = '#bbbbbb';
            ctx.beginPath();
            ctx.arc(item.x, item.y, 12, 0, Math.PI * 2);
            ctx.arc(item.x + 16, item.y - 6, 16, 0, Math.PI * 2);
            ctx.arc(item.x + 32, item.y, 12, 0, Math.PI * 2);
            ctx.fill();
        }

        // 生成云朵
        function addCloud() {
            cloudList.push({
                x: canvas.width,
                y: 25 + Math.random() * 60,
                speed: speed * 0.35
            })
        }

        // 碰撞检测
        function hitTest(a, b) {
            return a.x < b.x + b.w &&
                   a.x + a.width > b.x &&
                   a.y < b.y + b.h &&
                   a.y + a.height > b.y;
        }

        // 主循环
        function loop() {
            if (gameOver) {
                ctx.fillStyle = '#222';
                ctx.font = '36px sans-serif';
                ctx.textAlign = 'center';
                ctx.fillText('游戏结束！按空格重新开始', canvas.width / 2, canvas.height / 2);
                requestAnimationFrame(loop);
                return;
            }
            // 清空画布
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            // 地面线
            ctx.fillStyle = '#222';
            ctx.fillRect(0, groundY, canvas.width, 3);

            // 恐龙重力下落
            dino.vy += dino.gravity;
            dino.y += dino.vy;
            if (dino.y > groundY - dino.height) {
                dino.y = groundY - dino.height;
                dino.vy = 0;
            }

            // 绘制恐龙
            drawDino();

            // 随机生成障碍物/云朵
            if (Math.random() < 0.008) addCactus();
            if (Math.random() < 0.012) addCloud();

            // 更新仙人掌
            for (let i = cactusList.length - 1; i >= 0; i--) {
                const c = cactusList[i];
                c.x -= speed;
                drawCactus(c);
                // 碰撞判定
                let dinoBox = {
                    x: dino.x,
                    y: dino.duck ? groundY - 22 : dino.y,
                    width: dino.width,
                    height: dino.duck ? 22 : dino.height
                }
                if (hitTest(dinoBox, c)) gameOver = true;
                if (c.x + c.w < 0) cactusList.splice(i, 1);
            }

            // 更新云朵
            for (let i = cloudList.length - 1; i >= 0; i--) {
                const cl = cloudList[i];
                cl.x -= cl.speed;
                drawCloud(cl);
                if (cl.x > canvas.width + 50) cloudList.splice(i, 1);
            }

            // 计分、提速
            score++;
            if (score % 100 === 0) speed += 0.2;
            scoreDom.innerText = `分数：${Math.floor(score / 10)}`;

            requestAnimationFrame(loop);
        }

        loop();
    </script>
</body>
</html>
