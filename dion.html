<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>小恐龙跑酷游戏</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            background: #f7f7f7;
            padding-top: 20px;
        }
        #gameBox {
            border: 2px solid #333;
            background: #fff;
            overflow: hidden;
        }
        #scoreText {
            font-size: 28px;
            margin-bottom: 10px;
            font-weight: bold;
        }
        #tip {
            margin-top: 10px;
            color: #666;
        }
    </style>
</head>
<body>
    <div id="scoreText">分数：0</div>
    <canvas id="gameBox" width="800" height="200"></canvas>
    <div id="tip">操作：空格 / 上箭头 = 跳跃 | 下箭头 = 下蹲</div>
    <a href="./" style="margin-top:10px;">返回首页</a>

    <script>
        const canvas = document.getElementById('gameBox');
        const ctx = canvas.getContext('2d');
        const scoreText = document.getElementById('scoreText');

        // 资源：使用在线恐龙透明素材，无需本地图片
        const dinoImg = new Image();
        dinoImg.src = "https://i.imgur.com/5F8Z7Lw.png"; // 站立恐龙
        const dinoDuckImg = new Image();
        dinoDuckImg.src = "https://i.imgur.com/QnXzY0A.png"; // 下蹲恐龙
        const cactusImg = new Image();
        cactusImg.src = "https://i.imgur.com/9gVjX7Y.png"; // 仙人掌

        let score = 0;
        let speed = 6;
        let gameOver = false;

        const dino = {
            x: 50,
            y: 150,
            width: 44,
            height: 47,
            velocityY: 0,
            gravity: 0.6,
            jumpPower: -14,
            isDuck: false
        };
        const ground = { y: 180 };
        let cactusList = [];
        let cloudList = [];

        document.addEventListener('keydown', (e) => {
            if(gameOver) restartGame();
            if((e.code === 'Space' || e.code === 'ArrowUp') && dino.y >= ground.y - dino.height){
                dino.velocityY = dino.jumpPower;
            }
            if(e.code === 'ArrowDown') dino.isDuck = true;
        })
        document.addEventListener('keyup', (e) => {
            if(e.code === 'ArrowDown') dino.isDuck = false;
        })

        function createCactus(){
            const width = 30;
            cactusList.push({
                x: canvas.width,
                y: ground.y - width - 10,
                w: width,
                h: width + 10
            })
        }
        function createCloud(){
            cloudList.push({
                x: canvas.width,
                y: 20 + Math.random()*60,
                w: 40 + Math.random()*30,
                h: 20
            })
        }
        function isHit(rect1, rect2){
            return rect1.x < rect2.x + rect2.w &&
                   rect1.x + rect1.width > rect2.x &&
                   rect1.y < rect2.y + rect2.h &&
                   rect1.y + rect1.height > rect2.y;
        }
        function restartGame(){
            score = 0;
            speed = 6;
            gameOver = false;
            dino.y = 150;
            dino.velocityY = 0;
            cactusList = [];
            cloudList = [];
            scoreText.innerText = `分数：${score}`;
        }

        function gameLoop(){
            if(gameOver){
                ctx.fillStyle = '#333';
                ctx.font = '36px Arial';
                ctx.textAlign = 'center';
                ctx.fillText('游戏结束！按空格重新开始', canvas.width/2, canvas.height/2);
                requestAnimationFrame(gameLoop);
                return;
            }
            ctx.clearRect(0,0,canvas.width,canvas.height);
            // 绘制地面
            ctx.fillStyle = '#333';
            ctx.fillRect(0, ground.y, canvas.width, 2);

            // 恐龙重力
            dino.velocityY += dino.gravity;
            dino.y += dino.velocityY;
            if(dino.y > ground.y - dino.height){
                dino.y = ground.y - dino.height;
                dino.velocityY = 0;
            }

            // 绘制恐龙图片
            let drawImg = dino.isDuck ? dinoDuckImg : dinoImg;
            let drawH = dino.isDuck ? 26 : dino.height;
            let drawY = dino.isDuck ? ground.y - drawH : dino.y;
            ctx.drawImage(drawImg, dino.x, drawY, dino.width, drawH);

            // 生成障碍物
            if(Math.random() < 0.008) createCactus();
            if(Math.random() < 0.015) createCloud();

            // 仙人掌
            for(let i = cactusList.length - 1; i >= 0; i--){
                const c = cactusList[i];
                c.x -= speed;
                ctx.drawImage(cactusImg, c.x, c.y, c.w, c.h);
                const dinoBox = {
                    x: dino.x,
                    y: drawY,
                    width: dino.width,
                    height: drawH
                }
                if(isHit(dinoBox, c)) gameOver = true;
                if(c.x + c.w < 0) cactusList.splice(i,1);
            }

            // 云朵
            ctx.fillStyle = '#aaa';
            for(let i = cloudList.length - 1; i >= 0; i--){
                const cl = cloudList[i];
                cl.x -= speed * 0.4;
                ctx.fillRect(cl.x, cl.y, cl.w, cl.h);
                if(cl.x + cl.w < 0) cloudList.splice(i,1);
            }

            score++;
            if(score % 100 === 0) speed += 0.2;
            scoreText.innerText = `分数：${Math.floor(score / 10)}`;
            requestAnimationFrame(gameLoop);
        }
        gameLoop();
    </script>
</body>
</html>
